global:
  scrape_interval: 5s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "backend"
    static_configs:
      - targets: ["backend:8000"]

  - job_name: "worker"
    static_configs:
      - targets: ["worker:8001"]

  - job_name: "fastapi"
    static_configs:
      - targets: ["host.docker.internal:8000"]
